<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arcady - Vault</title>
  <link rel="icon" type="image/png" href="/download.png">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">

  <style>
    /* Vault page padding to avoid nav overlap */
    #vault-page {
      padding-top: 120px;          /* ← gives space under fixed nav */
      min-height: 100vh;
      box-sizing: border-box;
    }

    /* Lock screen styling */
    #vault-lock-screen {
      max-width: 540px;
      margin: 80px auto 0;
      padding: 40px 30px;
      background: rgba(30, 30, 60, 0.55);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 8px 32px rgba(0,0,0,0.45);
      text-align: center;
    }

    #vault-code {
      width: 100%;
      padding: 22px 20px;
      font-size: 1.6rem;
      text-align: center;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.18);
      border-radius: 16px;
      color: white;
      font-family: 'Fredoka', sans-serif;
      transition: all 0.3s ease;
    }

    #vault-code:focus {
      outline: none;
      border-color: #ffffffff;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.45);
      background: rgba(255, 255, 255, 0.81);
    }

    #vault-submit {
      width: 100%;
      margin-top: 20px;
      padding: 18px;
      font-size: 1.4rem;
      font-weight: 600;
      background: linear-gradient(135deg, #ffffffff, #939393ff);
      border: none;
      color: white;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.3s;
    }

    #vault-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(255, 255, 255, 0.45);
    }

    #vault-error {
      color: #ff6b6b;
      font-weight: 500;
      margin-top: 20px;
      font-size: 1.2rem;
    }

    /* Unlocked screen */
    #vault-unlocked-screen {
      padding: 40px 20px;
    }

    #vault-boxes {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 25px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Card with image styling */
    .vault-card {
      width: 260px;
      height: 360px;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
      transition: all 0.35s ease;
      cursor: pointer;
      position: relative;
      text-decoration: none;
      color: white;
    }

    .vault-card:hover {
      transform: translateY(-12px) scale(1.04);
      box-shadow: 0 18px 40px rgba(255, 255, 255, 0.35);
      border-color: rgba(255, 255, 255, 0.45);
    }

    .vault-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 16px 16px 0 0;
      display: block;
    }

    .vault-card .title {
      padding: 18px 14px;
      font-size: 1.25rem;
      font-weight: 600;
      text-align: center;
      background: rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="glass" id="nav-bar">
    <a href="index.html" class="nav-logo">
      <i data-lucide="sparkles"></i>
      Arcady
    </a>
    <div class="nav-links">
      <a href="index.html"><i data-lucide="home"></i> Home</a>
      <a href="games.html"><i data-lucide="gamepad-2"></i> Games</a>
      <a href="proxys.html"><i data-lucide="layout-grid"></i> Proxys</a>
      <a href="chatgpt.html"><i data-lucide="brain"></i> Ai</a>
      <a href="more.html"><i data-lucide="circle-ellipsis"></i> More</a>
      <button id="settings-btn"><i data-lucide="settings"></i></button>
    </div>
  </nav>

  <!-- Settings Panel -->
  <div id="settings-panel" class="glass">
    <label for="bg-color">Background Color:</label>
    <input type="color" id="bg-color" value="#87CEEB">
    <label for="font-color">Font Color:</label>
    <input type="color" id="font-color" value="#000000">
    <label for="font-style">Font Style:</label>
    <select id="font-style">
      <option value="'Fredoka', sans-serif">Fredoka</option>
      <option value="'Roboto', sans-serif">Roboto</option>
      <option value="'Playfair Display', serif">Playfair Display</option>
    </select>
    <label for="bg-image">Background Image:</label>
    <input type="file" id="bg-image" accept="image/*">
    <button id="open-about-blank">Open in about:blank</button>
    <label for="tab-title">Tab Cloak Title:</label>
    <input type="text" id="tab-title" placeholder="e.g., Google Classroom">
    <label for="tab-favicon">Tab Cloak Favicon URL:</label>
    <input type="text" id="tab-favicon" placeholder="https://.../favicon.ico">
    <button id="apply-cloak">Apply Tab Cloak</button>
    <label>Font Glow:</label>
    <input type="checkbox" id="font-glow">
    <label for="nav-position">Nav Position:</label>
    <select id="nav-position">
      <option value="top-center">Top Center</option>
      <option value="bottom-center">Bottom Center</option>
      <option value="left">Left Side</option>
      <option value="right">Right Side</option>
    </select>
    <button id="reset-settings">Reset All Settings</button>
  </div>

  <!-- Floating Buttons -->
  <button id="soundboard-btn" class="floating-btn glass" title="Soundboard">
    <i data-lucide="music"></i>
  </button>
  <button id="panic-btn" class="floating-btn glass" title="PANIC">
    <i data-lucide="alert-triangle"></i>
  </button>

  <!-- VAULT – full page -->
  <div id="vault-page">
    <!-- Lock Screen -->
    <div id="vault-lock-screen">
      <h1 style="font-size: 3.5rem; margin-bottom: 30px; color: #fff;">🔒 Arcady Vault</h1>
      <p style="font-size: 1.4rem; margin-bottom: 40px; color: #ddd;">Enter secret combination code to unlock</p>
      <input type="text" id="vault-code" placeholder="only some people have this">
      <button id="vault-submit">Unlock</button>
      <div id="vault-error">Invalid code</div>
    </div>

    <!-- Unlocked – shows boxes with images -->
    <div id="vault-unlocked-screen" style="display: none;">
      <div style="text-align: center; margin: 60px 0 40px;">
        <h1 id="vault-name" style="font-size: 3rem; color: #fff; margin-bottom: 20px;"></h1>
        <button id="vault-lock-again" style="padding: 14px 40px; font-size: 1.2rem; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; border-radius: 12px; cursor: pointer;">Lock Vault</button>
      </div>
      
      <div id="vault-boxes"></div>
    </div>
  </div>

  <!-- Game Modal -->
  <div id="iframe-modal" class="modal glass" style="display: none;">
    <div class="modal-content">
      <button class="modal-close" title="Close">×</button>
      <div class="iframe-wrapper">
        <iframe id="modal-iframe" src="about:blank" frameborder="0"></iframe>
      </div>
      <div class="modal-controls">
        <button id="btn-refresh">↻ Refresh</button>
        <button id="btn-fullscreen">⛶ Full Screen</button>
        <button id="btn-new-tab">↗ Open in new tab</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script>
    lucide.createIcons();

    // ── SETTINGS CODE ── (keep your original settings listeners here)
    const settingsBtn = document.getElementById('settings-btn');
    const settingsPanel = document.getElementById('settings-panel');
    const body = document.body;
    const navBar = document.getElementById('nav-bar');

    settingsBtn.addEventListener('click', () => {
      settingsPanel.style.display = settingsPanel.style.display === 'flex' ? 'none' : 'flex';
    });

    // Load saved settings
    window.addEventListener('load', () => {
      if (localStorage.getItem('bgColor')) body.style.backgroundColor = localStorage.getItem('bgColor');
      if (localStorage.getItem('fontColor')) body.style.color = localStorage.getItem('fontColor');
      if (localStorage.getItem('fontStyle')) body.style.fontFamily = localStorage.getItem('fontStyle');
      if (localStorage.getItem('bgImage')) {
        body.style.backgroundImage = `url(${localStorage.getItem('bgImage')})`;
        body.style.backgroundSize = 'cover';
        body.style.backgroundPosition = 'center';
      }
      if (localStorage.getItem('fontGlow') === 'true') {
        body.classList.add('font-glow');
        document.getElementById('font-glow').checked = true;
      }
      if (localStorage.getItem('navPosition')) {
        applyNavPosition(localStorage.getItem('navPosition'));
        document.getElementById('nav-position').value = localStorage.getItem('navPosition');
      }
      if (localStorage.getItem('tabTitle')) document.title = localStorage.getItem('tabTitle');
      if (localStorage.getItem('tabFavicon')) {
        let link = document.querySelector("link[rel*='icon']") || document.createElement('link');
        link.rel = 'icon';
        link.href = localStorage.getItem('tabFavicon');
        document.head.appendChild(link);
      }
    });

    // ... keep all your other settings event listeners (bg-color, font-color, font-style, bg-image, cloak, glow, nav-position, reset) ...

    // ── GAME MODAL ──
    const modal = document.getElementById('iframe-modal');
    const iframe = document.getElementById('modal-iframe');
    const modalClose = document.querySelector('#iframe-modal .modal-close');
    let currentUrl = '';

    function closeModal() {
      modal.style.display = 'none';
      iframe.src = 'about:blank';
      document.body.style.overflow = '';
    }

    modalClose.addEventListener('click', closeModal);
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

    document.getElementById('btn-refresh').addEventListener('click', () => { if (currentUrl) iframe.src = currentUrl; });
    document.getElementById('btn-new-tab').addEventListener('click', () => { if (currentUrl) window.open(currentUrl, '_blank'); closeModal(); });
    document.getElementById('btn-fullscreen').addEventListener('click', () => {
      if (iframe.requestFullscreen) iframe.requestFullscreen();
      else if (iframe.webkitRequestFullscreen) iframe.webkitRequestFullscreen();
      else if (iframe.msRequestFullscreen) iframe.msRequestFullscreen();
    });

    const openGame = (url) => {
      if (!url || url === '#' || url.startsWith('javascript:')) return;
      currentUrl = url;
      iframe.src = url;
      modal.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    };

    // ── VAULT LOGIC WITH IMAGES ──
    const vaultLockScreen = document.getElementById('vault-lock-screen');
    const vaultUnlockedScreen = document.getElementById('vault-unlocked-screen');
    const vaultCodeInput = document.getElementById('vault-code');
    const vaultSubmit = document.getElementById('vault-submit');
    const vaultError = document.getElementById('vault-error');
    const vaultNameEl = document.getElementById('vault-name');
    const vaultBoxes = document.getElementById('vault-boxes');
    const vaultLockAgain = document.getElementById('vault-lock-again');

    const vaultData = {
      "bez a boo": {
        name: "Beza Boo Vault",
        boxes: [
          { 
            title: "Beza Boo Clicker", 
            url: "style.html",
            image: "features/bezabooclicker.jpg"
          },
        ]
      },
      "1": {
        name: "Random Link Vault",
        boxes: [
          { 
            title: "Level 1 – Neon Rush", 
            url: "https://example.com/level1a",
            image: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&q=80&w=800"
          },
          { 
            title: "Level 1 – Shadow Strike", 
            url: "https://example.com/level1b",
            image: "https://images.unsplash.com/photo-1511512578047-dfb36784e0bc?auto=format&fit=crop&q=80&w=800"
          },
          { 
            title: "Level 1 – Pixel Storm", 
            url: "https://example.com/level1c",
            image: "https://images.unsplash.com/photo-1538481199708-c76395da0b9d?auto=format&fit=crop&q=80&w=800"
          }
        ]
      },
      "2": {
        name: "Code 2 Vault",
        boxes: [
          { 
            title: "Level 2 – Cyber Drift", 
            url: "https://example.com/level2x",
            image: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&q=80&w=800"
          },
          { 
            title: "Level 2 – Void Runner", 
            url: "https://example.com/level2y",
            image: "https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80&w=800"
          }
        ]
      },
      "3": {
        name: "Code 3 Vault",
        boxes: [
          { 
            title: "Secret 3-1", 
            url: "https://example.com/level3-1",
            image: "https://images.unsplash.com/photo-1552826781-1132a57235e8?auto=format&fit=crop&q=80&w=800"
          },
          { 
            title: "Secret 3-2", 
            url: "https://example.com/level3-2",
            image: "https://images.unsplash.com/photo-1551103782-8b7b3a1423b4?auto=format&fit=crop&q=80&w=800"
          },
          { 
            title: "Secret 3-3", 
            url: "https://example.com/level3-3",
            image: "https://images.unsplash.com/photo-1511512578047-dfb36784e0bc?auto=format&fit=crop&q=80&w=800"
          }
        ]
      },
      "4": {
        name: "Code 4 Vault",
        boxes: [
          { 
            title: "Final Alpha", 
            url: "https://example.com/final-alpha",
            image: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&q=80&w=800"
          },
          { 
            title: "Final Beta", 
            url: "https://example.com/final-beta",
            image: "https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80&w=800"
          },
          { 
            title: "Final Gamma", 
            url: "https://example.com/final-gamma",
            image: "https://images.unsplash.com/photo-1538481199708-c76395da0b9d?auto=format&fit=crop&q=80&w=800"
          }
        ]
      }
    };

    function unlockVault() {
      const code = vaultCodeInput.value.trim().toLowerCase();
      const data = vaultData[code];

      if (data) {
        vaultLockScreen.style.display = 'none';
        vaultUnlockedScreen.style.display = 'block';
        vaultNameEl.textContent = data.name;

        vaultBoxes.innerHTML = '';
        data.boxes.forEach(box => {
          const card = document.createElement('a');
          card.className = 'vault-card';
          card.innerHTML = `
            <img src="${box.image}" alt="${box.title}">
            <div class="title">${box.title}</div>
          `;
          card.addEventListener('click', e => {
            e.preventDefault();
            openGame(box.url);
          });
          vaultBoxes.appendChild(card);
        });
      } else {
        vaultError.style.display = 'block';
        setTimeout(() => vaultError.style.display = 'none', 2500);
      }
    }

    function lockVault() {
      vaultUnlockedScreen.style.display = 'none';
      vaultLockScreen.style.display = 'block';
      vaultCodeInput.value = '';
      vaultError.style.display = 'none';
    }

    vaultSubmit.addEventListener('click', unlockVault);
    vaultCodeInput.addEventListener('keypress', e => { if (e.key === 'Enter') unlockVault(); });
    vaultLockAgain.addEventListener('click', lockVault);

    // Soundboard + Panic
    document.getElementById('soundboard-btn').addEventListener('click', () => openGame('features/soundboard.html'));
    document.getElementById('panic-btn').addEventListener('click', () => {
      if (confirm('🚨 PANIC BUTTON — Redirect now?')) window.location.href = 'https://launchpad.classlink.com/';
    });

    lucide.createIcons();
  </script>
</body>
</html>
